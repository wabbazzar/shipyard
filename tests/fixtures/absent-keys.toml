# Fixture: the "key absent" variant for all three gate keys, in canonical
# section form ([build]/[release]) with NO [names] block.
#
#   branch          — absent (trunk must be detected, not defaulted)
#   medic.can_merge — absent (self-merge default under test)
#   build.allow_no_ci — absent (a repo with zero CI checks must not pass)
#
# No [names] block → display names fall back to the role ids (build, release),
# so the svc/units use the canonical role names.
#
# release.test_cmd / typecheck are no-ops so the deterministic post-merge
# path can run in a test without a toolchain.

project_name  = "__PROJECT_NAME__"
project_owner = "fixture-owner"

[paths]
result_dir   = "tmp"
worktree_dir = ".worktrees"

[release]
test_cmd     = "true"
typecheck    = "true"
budget_hook  = 0.10
budget_daily = 0.10

[build]
budget         = 0.10
wall_clock_sec = 60

[medic]
daily_escalation_cap = 5
