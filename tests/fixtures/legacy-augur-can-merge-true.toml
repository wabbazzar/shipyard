# Fixture: a pre-rename LEGACY config — [augur]/[guardian] sections and
# medic.augur_can_merge. No [names] block. Exercises two things at once:
#   1. load-config normalization ([augur]→[build], [guardian]→[release],
#      augur_can_merge→can_merge) + the one-shot deprecation warning;
#   2. the svc safety property — with no [names], display still resolves to
#      the legacy names (build→augur, release→guardian).

project_name  = "__PROJECT_NAME__"
project_owner = "fixture-owner"
branch        = "main"

[paths]
result_dir   = "tmp"
worktree_dir = ".worktrees"

[guardian]
test_cmd     = "true"
typecheck    = "true"

[augur]
budget         = 0.10
wall_clock_sec = 60
allow_no_ci    = true

[medic]
daily_escalation_cap = 5
augur_can_merge      = true
