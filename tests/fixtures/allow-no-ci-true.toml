# Fixture: `build.allow_no_ci` present and true — a repo with zero CI
# checks may pass the CI gate, but the waiver must be emitted loudly.
# Canonical sections, no [names] block.

project_name  = "__PROJECT_NAME__"
project_owner = "fixture-owner"
branch        = "main"

[paths]
result_dir   = "tmp"
worktree_dir = ".worktrees"

[release]
test_cmd     = "true"
typecheck    = "true"

[build]
budget         = 0.10
wall_clock_sec = 60
allow_no_ci    = true

[medic]
daily_escalation_cap = 5
can_merge            = true
