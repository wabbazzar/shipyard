name: checks
on:
  push:
    branches: [main]
  pull_request:

jobs:
  leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/leak-check.sh

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n all scripts
        run: |
          bash -n install.sh agents/lib/*.sh agents/*/runner.sh .githooks/pre-commit scripts/leak-check.sh
