name: checks
on:
  push:
    branches: [main]
  pull_request:

jobs:
  leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/leak-check.sh

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n all scripts
        run: |
          bash -n install.sh agents/lib/*.sh agents/*/runner.sh .githooks/pre-commit scripts/leak-check.sh scripts/check-deck-fresh.sh
      - name: py_compile generators
        run: python3 -m py_compile scripts/gen-deck-data.py

  deck-fresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deck data is generated from the skills (not stale)
        run: bash scripts/check-deck-fresh.sh

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: bats tests
        run: bats tests/
